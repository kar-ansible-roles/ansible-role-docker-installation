- name: Docker Installation | Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - gnupg-agent
    state: present

- name: Docker Installation | Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Docker Installation | Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: true

- name: Docker Installation | Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - python3-docker
      - python3-pip
    state: present

- name: Docker Installation | Install Docker SDK for Python
  ansible.builtin.pip:
    name: 
     - "docker>=1.10.0"
     - jsondiff
    state: present
    executable: pip3


- name: Docker Installation | Ensure Docker is running and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Docker Installation | Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"


- name: Docker Installation | Check docker-compose binary
  ansible.builtin.stat:
    path: /usr/local/bin/docker-compose
  register: compose_bin

- name: Docker Installation | Install Docker Compose
  ansible.builtin.get_url:
    url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
    owner: root
    group: root
  when: not compose_bin.stat.exists

- name: Docker Installation | Verify Docker installation
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Docker Installation | Verify Docker Compose installation
  ansible.builtin.command: docker-compose --version
  register: docker_compose_version
  changed_when: false

- name: Docker Installation | Show Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"

- name: Docker Installation | Show Docker Compose version
  ansible.builtin.debug:
    msg: "{{ docker_compose_version.stdout }}"
